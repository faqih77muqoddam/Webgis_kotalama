<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>WebGIS Kota Lama Semarang</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
html, body {
  margin: 0;
  height: 100%;
  font-family: "Segoe UI", Arial, sans-serif;
}

#map {
  width: 100%;
  height: 100vh;
}

/* =========================
   TITLE BOX
========================= */

.title-box {
  position: absolute;
  top: 20px;
  left: 65px;
  z-index: 1000;

  width: 360px;
  padding: 18px 22px;

  border-radius: 24px;

  background: rgba(255, 240, 247, 0.82);

  backdrop-filter: blur(12px);

  border: 1.5px solid rgba(255,182,217,.7);

  box-shadow:
    0 10px 30px rgba(0,0,0,.18);
}

.title-box .badge {
  display: inline-block;

  padding: 6px 12px;

  border-radius: 999px;

  background: #A7D8F2;

  color: #31566d;

  font-size: 11px;

  font-weight: 700;

  margin-bottom: 10px;

  letter-spacing: .4px;
}

.title-box h1 {
  margin: 0;

  font-size: 21px;

  color: #364866;

  line-height: 1.25;

  font-weight: 800;
}

.title-box p {
  margin-top: 10px;

  font-size: 13px;

  line-height: 1.5;

  color: #555;
}

/* =========================
   PANEL
========================= */

.panel {
  position: absolute;

  top: 22px;
  right: 22px;

  z-index: 1000;

  width: 250px;

  max-height: 78vh;

  overflow-y: auto;

  padding: 18px;

  border-radius: 24px;

  background: rgba(255,255,255,.82);

  backdrop-filter: blur(12px);

  border: 1.5px solid rgba(167,216,242,.7);

  box-shadow:
    0 10px 30px rgba(0,0,0,.18);
}

.panel h3 {
  margin: 0 0 14px;

  color: #364866;

  font-size: 17px;
}

.section-title {
  margin-top: 16px;
  margin-bottom: 8px;

  font-size: 11px;

  font-weight: 800;

  letter-spacing: .7px;

  color: #c94f8a;
}

.layer-row {
  display: flex;

  align-items: center;

  gap: 9px;

  margin: 10px 0;

  font-size: 14px;

  color: #444;
}

.layer-row input {
  accent-color: #d65d96;
}

.btn-group {
  display: flex;

  gap: 8px;

  margin: 12px 0;
}

.btn {
  flex: 1;

  border: none;

  padding: 10px;

  border-radius: 14px;

  background: #A7D8F2;

  color: #294b60;

  font-weight: 700;

  cursor: pointer;

  transition: .2s;
}

.btn:hover {
  transform: translateY(-1px);
}

.btn.off {
  background: #F8C8DC;

  color: #79405a;
}

/* =========================
   LEGENDA
========================= */

.legend-box {
  position: absolute;

  left: 24px;
  bottom: 24px;

  z-index: 1000;

  width: 210px;

  padding: 16px;

  border-radius: 22px;

  background: rgba(255,255,255,.82);

  backdrop-filter: blur(12px);

  border: 1.5px solid rgba(248,200,220,.7);

  box-shadow:
    0 10px 30px rgba(0,0,0,.18);
}

.legend-box h3 {
  margin: 0 0 12px;

  font-size: 16px;

  color: #364866;
}

.legend-item {
  display: flex;

  align-items: center;

  gap: 10px;

  margin: 9px 0;

  font-size: 13px;

  color: #444;
}

.symbol-poly {
  width: 26px;
  height: 14px;

  border-radius: 5px;
}

.symbol-line {
  width: 28px;
  height: 0;
}

/* =========================
   POPUP
========================= */

.leaflet-popup-content-wrapper {
  border-radius: 18px;
}

.popup-title {
  margin: 0 0 10px;

  color: #c94f8a;

  font-size: 16px;
}

.popup-table {
  border-collapse: collapse;

  width: 100%;

  font-size: 12px;
}

.popup-table td {
  border: 1px solid #eee;

  padding: 7px 9px;
}

.popup-table td:first-child {
  background: #ffd8e7;

  font-weight: 700;
}

/* =========================
   RESPONSIVE
========================= */

@media (max-width: 900px) {

  .title-box {
    width: 300px;
    left: 55px;
  }

  .title-box h1 {
    font-size: 18px;
  }

  .panel {
    width: 220px;
  }

  .legend-box {
    width: 180px;
  }
}
</style>
</head>

<body>

<div class="title-box">
  <div class="badge">WEBGIS • KOTA LAMA • SEMARANG</div>
  <h1>
    WebGIS Project by Farhana F<br>
    Kota Lama Semarang
  </h1>
  <p>Visualisasi bangunan umum, bangunan ikonik, jaringan jalan, dan kanal kawasan Kota Lama.</p>
</div>

<div id="map"></div>

<div class="panel">
  <h3>Layer Control</h3>

  <div class="section-title">BASEMAP</div>
  <label class="layer-row"><input type="radio" name="basemap" checked onclick="setBasemap('osm')"> OpenStreetMap</label>
  <label class="layer-row"><input type="radio" name="basemap" onclick="setBasemap('satellite')"> Satellite</label>
  <label class="layer-row"><input type="radio" name="basemap" onclick="setBasemap('dark')"> Carto Dark</label>

  <div class="section-title">DATA KOTA LAMA</div>
  <div class="btn-group">
    <button class="btn" onclick="toggleAll(true)">Semua ON</button>
    <button class="btn off" onclick="toggleAll(false)">Semua OFF</button>
  </div>

  <label class="layer-row"><input id="cbBangunan" type="checkbox" checked onchange="toggleLayer(bangunanUmumLayer,this.checked)"> Bangunan Umum</label>
  <label class="layer-row"><input id="cbIkonik" type="checkbox" checked onchange="toggleLayer(bangunanIkonikLayer,this.checked)"> Bangunan Ikonik</label>
  <label class="layer-row"><input id="cbJalan" type="checkbox" checked onchange="toggleLayer(jalanLayer,this.checked)"> Jalan Kota Lama</label>
  <label class="layer-row"><input id="cbKanal" type="checkbox" checked onchange="toggleLayer(kanalLayer,this.checked)"> Kanal/Sungai</label>
</div>

<div class="legend-box">
  <h3>Legenda</h3>
  <div class="legend-item"><span class="symbol-poly" style="background:#ffc2da;border:2px solid #d65d96;"></span> Bangunan Umum</div>
  <div class="legend-item"><span class="symbol-poly" style="background:#a7d8f2;border:2px solid #4b7bec;"></span> Bangunan Ikonik</div>
  <div class="legend-item"><span class="symbol-line" style="border-top:3px solid #555;"></span> Jalan</div>
  <div class="legend-item"><span class="symbol-line" style="border-top:4px solid #7ec8f8;"></span> Kanal/Sungai</div>
</div>

<script>
var map = L.map("map").setView([-6.9687,110.4255],17);

var osm = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution:"OpenStreetMap"
}).addTo(map);

var satellite = L.tileLayer(
  "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
  { attribution:"Esri" }
);

var dark = L.tileLayer(
  "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
  { attribution:"Carto" }
);

var currentBasemap = osm;

function setBasemap(type) {
  map.removeLayer(currentBasemap);

  if (type === "satellite") currentBasemap = satellite;
  else if (type === "dark") currentBasemap = dark;
  else currentBasemap = osm;

  currentBasemap.addTo(map);
}

var bangunanUmumLayer = L.layerGroup().addTo(map);
var bangunanIkonikLayer = L.layerGroup().addTo(map);
var jalanLayer = L.layerGroup().addTo(map);
var kanalLayer = L.layerGroup().addTo(map);

function getValue(props, keys, fallback = "-") {
  for (let key of keys) {
    if (props && props[key] !== undefined && props[key] !== null && props[key] !== "") {
      return props[key];
    }
  }
  return fallback;
}

function row(label, value) {
  if (!value || value === "-") return "";
  return `<tr><td>${label}</td><td>${value}</td></tr>`;
}

function formatJenisBangunan(value) {
  if (!value || value === "-") return "Bangunan Umum";
  if (value === "yes") return "Bangunan Umum";
  return value;
}

function makePopup(title, props) {
  props = props || {};

  let nama = getValue(props, ["name", "Name", "nama", "NAMOBJ"], title);
  let jenis = "-";
  let fungsi = "-";
  let kawasan = "Kota Lama Semarang";
  let statusData = "Data spasial WebGIS";
  let sumber = getValue(props, ["source", "Sumber", "sumber"], "OpenStreetMap & olahan WebGIS");

  let alamat = getValue(props, ["addr:full", "addr:street", "addr_street", "alamat", "Alamat"], "-");
  let operator = getValue(props, ["operator", "Operator", "pengelola"], "-");

  let kondisi = getValue(props, ["kondisi_bangunan", "building:condition", "kondisi"], "-");
  let fungsiDetail = getValue(props, ["fungsi_detail", "fungsi", "Fungsi"], "-");
  let statusPemanfaatan = getValue(props, ["status_pemanfaatan", "status"], "-");
  let jumlahLantai = getValue(props, ["building:levels", "lantai", "jumlah_lantai"], "-");
  let material = getValue(props, ["building:material", "material"], "-");
  let atap = getValue(props, ["roof:shape", "building:roof", "atap"], "-");

  if (title === "Bangunan Umum") {
    jenis = formatJenisBangunan(getValue(props, ["building", "building:type", "jenis", "Jenis"], "Bangunan Umum"));
    fungsi = getValue(props, ["amenity", "shop", "office", "tourism", "building:use"], "Aktivitas kawasan perkotaan");
    kawasan = "Kawasan Bangunan Kota Lama";
    statusData = "Data bangunan umum";
  }

  else if (title === "Bangunan Ikonik") {
    jenis = getValue(props, ["historic", "heritage", "tourism", "building", "jenis", "Jenis"], "Bangunan Ikonik/Heritage");
    fungsi = getValue(props, ["tourism", "amenity", "shop", "office"], "Objek heritage dan wisata");
    kawasan = "Kawasan Heritage Kota Lama";
    statusData = "Data bangunan ikonik";
  }

  else if (title === "Jalan Kota Lama") {
    jenis = getValue(props, ["highway", "jenis", "Jenis"], "Jaringan Jalan");
    fungsi = getValue(props, ["surface", "lanes", "oneway"], "Aksesibilitas kawasan");
    kawasan = "Koridor Jalan Kota Lama";
    statusData = "Data jaringan jalan";
  }

  else if (title === "Kanal/Sungai") {
    jenis = getValue(props, ["waterway", "natural", "jenis", "Jenis"], "Kanal/Sungai");
    fungsi = getValue(props, ["usage"], "Sistem drainase dan hidrografi kawasan");
    kawasan = "Sistem Kanal Kota Lama";
    statusData = "Data kanal/sungai";
  }

  return `
    <h3 class="popup-title">${nama}</h3>
    <table class="popup-table">
      ${row("Jenis", jenis)}
      ${row("Fungsi", fungsi)}
      ${row("Fungsi Detail", fungsiDetail)}
      ${row("Kawasan", kawasan)}
      ${row("Status Data", statusData)}
      ${row("Status Pemanfaatan", statusPemanfaatan)}
      ${row("Kondisi Bangunan", kondisi)}
      ${row("Jumlah Lantai", jumlahLantai)}
      ${row("Material", material)}
      ${row("Bentuk/Jenis Atap", atap)}
      ${row("Alamat/Jalan", alamat)}
      ${row("Operator", operator)}
      ${row("Sumber", sumber)}
    </table>
  `;
}

function addLayer(fileName, title, style, targetLayer, fit=false) {
  fetch("data/" + fileName)
    .then(res => res.json())
    .then(data => {
      var layer = L.geoJSON(data, {
        style: style,
        onEachFeature: function(feature, lyr) {
          console.log(title, feature.properties);

          lyr.on("mouseover", function() {
            if (lyr.setStyle) {
              lyr.setStyle({
                weight: (style.weight || 1) + 1.2
              });
            }
          });

          lyr.on("mouseout", function() {
            if (lyr.setStyle) {
              lyr.setStyle(style);
            }
          });

          lyr.bindPopup(makePopup(title, feature.properties));
        }
      });

      layer.addTo(targetLayer);

      if (fit && layer.getBounds().isValid()) {
        map.fitBounds(layer.getBounds(), {
          padding:[50,50],
          maxZoom:17
        });
      }
    })
    .catch(err => console.log("Gagal load:", fileName, err));
}

addLayer("bangunanreal.geojson", "Bangunan Umum", {
  color:"#d65d96",
  weight:1.2,
  fillColor:"#ffc2da",
  fillOpacity:0.42
}, bangunanUmumLayer, true);

addLayer("bangunan_ikonik.geojson", "Bangunan Ikonik", {
  color:"#4b7bec",
  weight:2.4,
  fillColor:"#a7d8f2",
  fillOpacity:0.9
}, bangunanIkonikLayer);

addLayer("jalan_real.geojson", "Jalan Kota Lama", {
  color:"#555",
  weight:2.2,
  opacity:0.9
}, jalanLayer);

addLayer("kanal_real.geojson", "Kanal/Sungai", {
  color:"#7ec8f8",
  weight:4,
  opacity:0.95
}, kanalLayer);

function toggleLayer(layer, status) {
  if (status) map.addLayer(layer);
  else map.removeLayer(layer);
}

function toggleAll(status) {
  document.getElementById("cbBangunan").checked = status;
  document.getElementById("cbIkonik").checked = status;
  document.getElementById("cbJalan").checked = status;
  document.getElementById("cbKanal").checked = status;

  toggleLayer(bangunanUmumLayer, status);
  toggleLayer(bangunanIkonikLayer, status);
  toggleLayer(jalanLayer, status);
  toggleLayer(kanalLayer, status);
}

L.control.scale({
  metric:true,
  imperial:false
}).addTo(map);
</script>

</body>
</html>
